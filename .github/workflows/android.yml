name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK with prebuilt Buildozer Docker image
        run: |
          chmod +x scripts/build-android-ci.sh scripts/patch-pyjnius.sh
          bash scripts/build-android-ci.sh

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tetris-android-debug
          path: bin/tetris-debug.apk
          if-no-files-found: error