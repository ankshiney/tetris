name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK with prebuilt Buildozer Docker image
        run: |
          set -euo pipefail
          mkdir -p .buildozer-global
          docker pull kivy/buildozer
          docker run --rm \
            -v "${{ github.workspace }}/.buildozer-global:/home/user/.buildozer" \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -w /home/user/hostcwd \
            kivy/buildozer \
            buildozer -v android debug 2>&1 | tee buildozer.log
          test "${PIPESTATUS[0]}" -eq 0

          mkdir -p bin
          APK="$(find . -name '*debug*.apk' -type f | head -1 || true)"
          if [ -z "$APK" ]; then
            echo "No APK found. Last 100 log lines:"
            tail -n 100 buildozer.log || true
            find . -name '*.apk' -type f || true
            exit 1
          fi
          cp "$APK" bin/tetris-debug.apk
          ls -la bin/

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tetris-android-debug
          path: bin/tetris-debug.apk
          if-no-files-found: error