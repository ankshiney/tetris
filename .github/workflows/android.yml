name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      BUILDOZER_WARN_ON_ROOT: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev libsqlite3-dev \
            ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3.0" "setuptools<71" buildozer appdirs colorama

      - name: Cache Buildozer downloads
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: |
          export USE_SDK_WRAPPER=1
          buildozer -v android debug 2>&1 | tee buildozer.log
          ls -la bin/ || true
          tail -n 80 buildozer.log || true

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetris-android-debug
          path: bin/*.apk
          if-no-files-found: error